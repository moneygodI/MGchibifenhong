<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG分红领取中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: linear-gradient(180deg, #0a192f 0%, #050e1a 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #fff;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 30px;
            margin-bottom: 40px;
            color: #64b5f6;
        }
        .contract-tip {
            font-size: 13px;
            color: #8892b0;
            text-align: center;
            word-break: break-all;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 18px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-connect {
            background: linear-gradient(90deg, #21c174 0%, #3dd28d 100%);
            color: white;
        }
        .btn-all {
            background: linear-gradient(90deg, #7b2cbf 0%, #c77dff 100%);
            color: white;
        }
        .btn-claim {
            background: linear-gradient(90deg, #2563eb 0%, #60a5fa 100%);
            color: white;
        }
        .info-card {
            background: rgba(25, 47, 81, 0.6);
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 18px;
            border: 1px solid rgba(99, 179, 237, 0.2);
        }
        .info-line {
            font-size: 16px;
            color: #a0cfff;
            margin: 8px 0;
            line-height: 1.7;
            word-break: break-all;
        }
        .info-value {
            color: #ffffff;
            font-weight: bold;
        }
        .input-box {
            width: 100%;
            background: rgba(25, 47, 81, 0.6);
            border: 1px solid rgba(99, 179, 237, 0.2);
            border-radius: 12px;
            padding: 18px;
            font-size: 18px;
            color: #fff;
            margin-bottom: 18px;
            outline: none;
        }
        .input-box::placeholder {
            color: #778da9;
        }
        .detail-link {
            color: #60d5ff;
            text-decoration: underline;
            font-size: 15px;
            cursor: pointer;
            display: inline-block;
            margin-top: 10px;
        }
        .status-text {
            margin: 10px 0 20px;
            text-align: center;
            font-size: 16px;
        }
        .success { color: #3dd28d; }
        .error { color: #ff6b6b; }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden { display: none; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 10px;
            border: 1px solid rgba(99, 179, 237, 0.2);
            text-align: left;
            color: #cbd5e1;
        }
        th {
            background: rgba(30, 58, 95, 0.7);
            color: #a0cfff;
        }
        .footer-tip {
            margin-top: 25px;
            font-size: 13px;
            color: #ff8888;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>MG分红领取中心</h1>
    <div class="contract-tip">
        ⚠️ 认准唯一合约地址：<br>
        0x661150e0D8Bd7D6dF8F14a3b27890bcD64162a8D
    </div>

    <!-- 状态1：未连接钱包 只显示连接按钮 -->
    <div id="wallet-section">
        <button class="btn btn-connect" onclick="connectWallet()">💰 连接钱包💰</button>
    </div>

    <!-- 状态2：连接钱包后 展示全部内容 -->
    <div id="user-info" class="hidden">
        <div class="info-card">
            <div class="info-line">👤 钱包地址：<span class="info-value" id="user-addr"></span></div>
            <div class="info-line">💰 持币数量：<span class="info-value" id="balance"></span> MG</div>
            <div class="info-line">🎁 待领分红：<span class="info-value" id="pending"></span> MG</div>
            <div class="info-line">📅 今日已领：<span class="info-value" id="daily-claims"></span> / 3 次</div>
            <div class="info-line">⏰ 领取状态：<span class="info-value" id="next-claim"></span></div>
        </div>

        <input type="text" class="input-box" id="claim-amount" placeholder="请输入要领取的分红数量">

        <button class="btn btn-all" onclick="claimAll()">一键全部领取</button>
        <button id="claim-btn" class="btn btn-claim" onclick="claimAmount()">立即领取分红</button>

        <div id="tx-status" class="status-text"></div>

        <div class="info-card">
            <div class="detail-link" onclick="toggleHistory()">📋 点击查看领取明细</div>
            <!-- 领取历史表格 默认隐藏 -->
            <div id="history-wrap" class="hidden">
                <table>
                    <thead>
                        <tr>
                            <th>领取时间</th>
                            <th>分红数量(MG)</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr><td colspan="2">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="footer-tip">
        ⚠️ 请在30天内领取分红，过期未领取将自动销毁 ⚠️
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    // 合约配置
    const CONTRACT_ADDRESS = '0x661150e0D8Bd7D6dF8F14a3b27890bcD64162a8D';
    const CHAIN_ID = 56;
    const MIN_HOLD_NUM = ethers.utils.parseEther("100");
    const COOLDOWN_TIME = 3600;

    const ABI = [
        "function balanceOf(address) view returns (uint256)",
        "function pendingPoints(address) view returns (uint256)",
        "function dailyClaims(address) view returns (uint256)",
        "function lastClaim(address) view returns (uint256)",
        "function claimPoints() external",
        "function transfer(address to, uint256 amount) returns (bool)",
        "event PointsClaimed(address indexed user, uint256 amount)"
    ];

    let provider, signer, contract;
    let userAddress = null;
    let isBusy = false;
    let historyShow = false;

    // 初始化钱包
    async function initProvider() {
        if (!window.ethereum) {
            alert('请安装 MetaMask/TP 钱包！');
            return false;
        }
        provider = new ethers.providers.Web3Provider(window.ethereum);
        return true;
    }

    // 校验BSC主网
    async function checkChain() {
        const network = await provider.getNetwork();
        if (network.chainId !== CHAIN_ID) {
            alert('请切换钱包至 BSC 币安智能链主网！');
            return false;
        }
        return true;
    }

    // 连接钱包
    async function connectWallet() {
        if (isBusy) return;
        isBusy = true;
        if (!await initProvider() || !await checkChain()) {
            isBusy = false;
            return;
        }

        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            signer = provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

            // 切换界面：隐藏连接按钮，展示数据面板
            document.getElementById('wallet-section').classList.add('hidden');
            document.getElementById('user-info').classList.remove('hidden');

            await refreshUserData();
            await loadHistory();

            // 监听账户/网络切换
            window.ethereum.on('accountsChanged', accs => {
                if (accs.length === 0) location.reload();
                else {
                    userAddress = accs[0];
                    signer = provider.getSigner();
                    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                    refreshUserData();
                    loadHistory();
                }
            });
            window.ethereum.on('chainChanged', () => location.reload());

        } catch (err) {
            alert('连接失败：' + err.message);
        }
        isBusy = false;
    }

    // 刷新账户数据 & 领取状态判断
    async function refreshUserData() {
        if (!contract || !userAddress) return;
        try {
            const [bal, pending, daily, lastClaim] = await Promise.all([
                contract.balanceOf(userAddress),
                contract.pendingPoints(userAddress),
                contract.dailyClaims(userAddress),
                contract.lastClaim(userAddress)
            ]);

            // 赋值展示
            document.getElementById('user-addr').innerText = userAddress;
            document.getElementById('balance').innerText = ethers.utils.formatEther(bal);
            document.getElementById('pending').innerText = ethers.utils.formatEther(pending);
            document.getElementById('daily-claims').innerText = daily.toString();

            const lastTs = lastClaim.toNumber();
            const now = Math.floor(Date.now() / 1000);
            const nextTime = lastTs + COOLDOWN_TIME;
            const claimBtn = document.getElementById('claim-btn');
            const nextTip = document.getElementById('next-claim');
            const input = document.getElementById('claim-amount');
            const allBtn = document.querySelector('.btn-all');

            // 重置状态
            claimBtn.disabled = false;
            allBtn.disabled = false;
            input.disabled = false;
            document.getElementById('tx-status').innerHTML = '';

            // 条件判断
            if (bal.lt(MIN_HOLD_NUM)) {
                nextTip.innerText = '❌ 持币不足100 MG，无法领取';
                claimBtn.disabled = allBtn.disabled = input.disabled = true;
            } else if (Number(daily) >= 3) {
                nextTip.innerText = '❌ 今日领取次数已达上限(3次)';
                claimBtn.disabled = allBtn.disabled = input.disabled = true;
            } else if (now < nextTime) {
                const remain = nextTime - now;
                const m = Math.floor(remain / 60);
                const s = remain % 60;
                nextTip.innerText = `⏳ 冷却中，还需 ${m}分${s}秒`;
                claimBtn.disabled = allBtn.disabled = input.disabled = true;
            } else {
                nextTip.innerText = '✅ 正常可领取';
            }
        } catch (e) {
            console.error(e);
        }
    }

    // 切换历史明细显示/隐藏
    function toggleHistory() {
        historyShow = !historyShow;
        const wrap = document.getElementById('history-wrap');
        wrap.classList.toggle('hidden', !historyShow);
    }

    // 加载领取历史
    async function loadHistory() {
        if (!contract || !userAddress) return;
        const tbody = document.getElementById('history-body');
        try {
            const blockNum = await provider.getBlockNumber();
            const filter = contract.filters.PointsClaimed(userAddress);
            const events = await contract.queryFilter(filter, blockNum - 5000, 'latest');
            events.reverse();
            const list = events.slice(0, 10);

            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2">暂无领取记录</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            for (let evt of list) {
                const block = await evt.getBlock();
                const time = new Date(block.timestamp * 1000).toLocaleString();
                const amount = ethers.utils.formatEther(evt.args.amount);
                tbody.innerHTML += `<tr><td>${time}</td><td>${amount}</td></tr>`;
            }
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="2">记录加载失败</td></tr>';
        }
    }

    // 一键全部领取
    async function claimAll() {
        document.getElementById('claim-amount').value = '';
        await doClaim();
    }

    // 按输入领取
    async function claimAmount() {
        const val = document.getElementById('claim-amount').value.trim();
        if (!val || isNaN(val) || Number(val) <= 0) {
            alert('请输入合法领取数量');
            return;
        }
        await doClaim();
    }

    // 核心领取逻辑：自转0结算 + 领取分红
    async function doClaim() {
        if (isBusy) return;
        isBusy = true;
        const status = document.getElementById('tx-status');
        const btn1 = document.querySelector('.btn-all');
        const btn2 = document.getElementById('claim-btn');
        btn1.disabled = btn2.disabled = true;

        try {
            status.innerHTML = '<span class="loader"></span> 结算分红中...';
            // 自转0代币触发结算
            const tx1 = await contract.transfer(userAddress, 0);
            await tx1.wait();

            status.innerHTML = '<span class="loader"></span> 领取分红中...';
            const tx2 = await contract.claimPoints();
            await tx2.wait();

            status.innerHTML = '<span class="success">✅ 分红领取成功！</span>';
            await refreshUserData();
            await loadHistory();
        } catch (err) {
            let msg = err.message.includes('user rejected') ? '您取消了交易' : err.message;
            status.innerHTML = `<span class="error">❌ ${msg}</span>`;
        }
        isBusy = false;
        await refreshUserData();
    }

    window.addEventListener('load', initProvider);
</script>
</body>
</html>
