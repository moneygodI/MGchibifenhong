<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG持币分红领取中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #0b132b;
            min-height: 100vh;
            color: #fff;
            padding-bottom: 70px;
        }
        /* 右上角连接钱包按钮 */
        .wallet-top-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 999;
            padding: 10px 20px;
            background: linear-gradient(90deg, #1db954, #34d399);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(29, 185, 84, 0.3);
        }
        .wallet-top-btn:hover {
            opacity: 0.9;
        }
        /* 主容器卡片 */
        .container {
            max-width: 520px;
            margin: 80px auto 0;
            padding: 20px;
        }
        .card {
            background: #1a2744;
            border: 1px solid #3b82f650;
            border-radius: 16px;
            padding: 28px;
        }
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom:22px;
        }
        .contract-addr{
            color:#93c5fd;
            font-size:14px;
            text-align:center;
            word-break:break-all;
            margin-bottom:20px;
            line-height:1.6;
        }
        .info-block {
            background: #16213e;
            border: 1px solid #3b82f630;
            border-radius: 12px;
            padding: 18px;
            margin-bottom:20px;
            line-height:2;
        }
        .info-block p{
            color:#bfdbfe;
        }
        .info-block span{
            color:#ffffff;
        }
        .btn-group{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            margin-bottom:15px;
        }
        #check-btn{
            flex:1;
            padding:14px;
            border:none;
            border-radius:12px;
            font-size:16px;
            background:linear-gradient(90deg,#f59e0b,#fbbf24);
            color:#fff;
            cursor:pointer;
        }
        #claim-btn{
            flex:1;
            padding:14px;
            border:none;
            border-radius:12px;
            font-size:16px;
            background:linear-gradient(90deg,#10b981,#34d399);
            color:#fff;
            cursor:pointer;
        }
        #check-btn:disabled,#claim-btn:disabled{
            opacity:0.55;
            cursor:not-allowed;
        }
        .pending-display{
            font-size:19px;
            font-weight:bold;
            color:#a78bfa;
            margin:12px 0;
        }
        .status-txt {
            font-size: 15px;
            margin: 10px 0;
        }
        .success { color: #34d399; font-weight:bold; }
        .error { color: #f87171; font-weight:bold; }
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 6px;
            vertical-align:middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /*表格样式*/
        table{
            width:100%;
            border-collapse:collapse;
            margin-top:25px;
        }
        th,td{
            padding:11px 8px;
            border-bottom:1px solid #3b82f630;
            color:#bfdbfe;
            text-align:left;
        }
        th{
            background:#16213e;
            color:#93c5fd;
        }
        h3{
            color:#93c5fd;
            margin-top:25px;
            margin-bottom:10px;
        }
        /*底部常驻提示*/
        .footer-tip {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #16213e;
            color: #f87171;
            text-align: center;
            padding: 12px;
            font-size: 14px;
            border-top: 1px solid #3b82f630;
        }
    </style>
</head>
<body>
    <!--右上角钱包按钮-->
    <button class="wallet-top-btn" id="topWalletBtn" onclick="connectWallet()">连接钱包</button>

    <div class="container">
        <div class="card">
            <h1 class="title">MG持币分红领取中心</h1>
            <div class="contract-addr">
                ⚠️ 请认准唯一合约地址：<br>
                <strong>0x661150e0D8Bd7D6dF8F14a3b27890bcD64162a8D</strong>
            </div>

            <div id="user-info">
                <div class="info-block">
                    <p>地址: <span id="user-addr"></span></p>
                    <p>持币数量: <span id="balance"></span> MG</p>
                    <p>今日已领: <span id="daily-claims"></span> / 3 次</p>
                    <p>下次可领时间: <span id="next-claim"></span></p>
                </div>

                <div class="btn-group">
                    <button id="check-btn" onclick="checkPending()">🔍 查看可领分红</button>
                </div>

                <div id="pending-area" style="display:none;">
                    <p class="pending-display">可领分红: <span id="pending-amount"></span> MG</p>
                    <div class="btn-group">
                        <button id="claim-btn" onclick="claimDividend()" disabled>领取分红</button>
                    </div>
                </div>
                <div class="status-txt" id="tx-status"></div>
            </div>

            <h3>📋 领取历史 (最近10条)</h3>
            <table>
                <thead>
                    <tr><th>时间</th><th>数量 (MG)</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <!--底部30天提示固定栏-->
    <div class="footer-tip">
        ⚠️ 请在30天内领取您的持币分红，过期未领取将自动销毁
    </div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    const CONTRACT_ADDRESS = '0x661150e0D8Bd7D6dF8F14a3b27890bcD64162a8D';
    const CHAIN_ID = 56;

    const ABI = [
        "function balanceOf(address) view returns (uint256)",
        "function pendingPoints(address) view returns (uint256)",
        "function dailyClaims(address) view returns (uint256)",
        "function lastClaim(address) view returns (uint256)",
        "function globalIndex() view returns (uint256)",
        "function userIndex(address) view returns (uint256)",
        "function claimPoints() external",
        "function transfer(address to, uint256 amount) returns (bool)",
        "event PointsClaimed(address indexed user, uint256 amount)"
    ];

    let provider, signer, contract;
    let userAddress = null;
    let pendingChecked = false;

    async function initProvider() {
        if (window.ethereum) {
            provider = new ethers.providers.Web3Provider(window.ethereum);
        } else {
            alert('请安装 MetaMask 或 TP 钱包!');
        }
    }

    async function connectWallet() {
        if (!provider) await initProvider();
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            signer = provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            document.getElementById('topWalletBtn').innerText = '已连接钱包';
            await refreshUserData();
            await loadHistory();

            //监听钱包切换
            window.ethereum.on('accountsChanged', (accs) => {
                if (accs.length === 0) location.reload();
                else {
                    userAddress = accs[0];
                    signer = provider.getSigner();
                    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                    resetPendingArea();
                    refreshUserData();
                    loadHistory();
                }
            })
        } catch (err) {
            console.error(err);
            alert('连接失败: ' + err.message);
        }
    }

    async function refreshUserData() {
        if (!contract || !userAddress) return;
        try {
            const [bal, daily, lastClaim] = await Promise.all([
                contract.balanceOf(userAddress),
                contract.dailyClaims(userAddress),
                contract.lastClaim(userAddress)
            ]);
            document.getElementById('user-addr').innerText = userAddress;
            document.getElementById('balance').innerText = ethers.utils.formatEther(bal);
            document.getElementById('daily-claims').innerText = daily.toString();

            const lastTs = lastClaim.toNumber();
            const cooldown = 3600;
            const nextTime = lastTs + cooldown;
            const now = Math.floor(Date.now() / 1000);
            let nextStr;
            if(now >= nextTime){
                nextStr = '现在可以领取';
            }else{
                const leave = nextTime - now;
                let m = Math.floor(leave/60);
                let s = leave%60;
                nextStr = `还需 ${m}分${s}秒`;
            }
            document.getElementById('next-claim').innerText = nextStr;

            //不足100禁用查看
            const min100 = ethers.utils.parseEther('100');
            document.getElementById('check-btn').disabled = bal.lt(min100);
            if(bal.lt(min100)){
                document.getElementById('next-claim').innerText = '持币不足100，无法领取';
            }
        } catch (e) {console.error(e)}
    }

    async function checkPending() {
        if (!contract || !userAddress) return;
        const statusEl = document.getElementById('tx-status');
        statusEl.innerHTML = '<span class="loader"></span> 正在结算分红点数...';
        try {
            const tx = await contract.transfer(userAddress,0);
            statusEl.innerHTML = '结算交易确认中... 哈希: ' + tx.hash;
            await tx.wait();
            const pending = await contract.pendingPoints(userAddress);
            document.getElementById('pending-amount').innerText = ethers.utils.formatEther(pending);
            document.getElementById('pending-area').style.display = 'block';
            document.getElementById('claim-btn').disabled = pending.isZero();
            pendingChecked = true;
            statusEl.innerHTML = '<span class="success">结算完成，请点击领取分红</span>';
        } catch (err) {
            statusEl.innerHTML = `<span class="error">结算失败: ${err.message}</span>`;
        }
    }

    async function claimDividend() {
        if (!contract || !userAddress || !pendingChecked) return;
        const statusEl = document.getElementById('tx-status');
        statusEl.innerHTML = '<span class="loader"></span> 正在领取分红...';
        try {
            const tx = await contract.claimPoints();
            await tx.wait();
            statusEl.innerHTML = '<span class="success">领取成功!</span>';
            resetPendingArea();
            await refreshUserData();
            await loadHistory();
        } catch (err) {
            statusEl.innerHTML = `<span class="error">领取失败: ${err.message}</span>`;
        }
    }

    function resetPendingArea() {
        document.getElementById('pending-area').style.display = 'none';
        document.getElementById('claim-btn').disabled = true;
        document.getElementById('tx-status').innerHTML = '';
        pendingChecked = false;
    }

    async function loadHistory() {
        if (!contract || !userAddress) return;
        try {
            const filter = contract.filters.PointsClaimed(userAddress);
            const events = await contract.queryFilter(filter,-10000,'latest');
            events.reverse();
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            const list = events.slice(0,10);
            if(list.length ===0){
                tbody.innerHTML = '<tr><td colspan="2">暂无领取记录</td></tr>';
                return;
            }
            for(let item of list){
                const block = await item.getBlock();
                const time = new Date(block.timestamp*1000).toLocaleString();
                const num = ethers.utils.formatEther(item.args.amount);
                tbody.innerHTML += `<tr><td>${time}</td><td>${num}</td></tr>`;
            }
        } catch (e) {console.error(e)}
    }

    window.onload = initProvider;
</script>
</body>
</html>
